services:
  web:
    container_name: bilieu-web
    build: .
    restart: unless-stopped
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s