name: Deploy GrenobleSki

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/root/bilieu"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
            APP_PORT="8082"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            docker compose -f docker-compose.yml up -d --build

            echo "⏳ Waiting for web container health"
            for i in $(seq 1 60); do
              CONTAINER_STATE=$(docker inspect --format='{{.State.Status}}' bilieu-web 2>/dev/null || echo "missing")
              HEALTH_STATE=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' bilieu-web 2>/dev/null || echo "missing")
              RESTART_COUNT=$(docker inspect --format='{{.RestartCount}}' bilieu-web 2>/dev/null || echo "0")
              echo "web state: ${CONTAINER_STATE}, health: ${HEALTH_STATE}, restarts: ${RESTART_COUNT}"

              if [ "${RESTART_COUNT}" -ge 3 ] || [ "${HEALTH_STATE}" = "unhealthy" ]; then
                echo "❌ Web container unstable (restarts/unhealthy)."
                docker compose -f docker-compose.yml ps || true
                docker compose -f docker-compose.yml logs --tail=200 web || true
                exit 1
              fi

              if [ "${CONTAINER_STATE}" = "running" ] && [ "${HEALTH_STATE}" = "healthy" ]; then
                break
              fi

              sleep 2
            done

            echo "⏳ Waiting for app on http://127.0.0.1:${APP_PORT}"
            for i in $(seq 1 60); do
              if curl -fsS "http://127.0.0.1:${APP_PORT}" >/dev/null; then
                echo "✅ App is reachable on port ${APP_PORT}"
                exit 0
              fi
              sleep 2
            done

            echo "❌ App did not become ready on port ${APP_PORT}"
            docker compose -f docker-compose.yml ps || true
            docker compose -f docker-compose.yml logs --tail=200 web || true
            exit 1